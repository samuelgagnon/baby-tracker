<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi des boires</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 16px;
    }

    h1 { text-align: center; }

    .card {
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .buttons button {
      flex: 1;
      padding: 14px;
      font-size: 14px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
      font-weight: bold;
      white-space: pre-line;
    }

    input[type="datetime-local"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .datetime-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .now-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #eee;
      font-size: 20px;
      cursor: pointer;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #34c759;
      color: white;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .day-header {
      background: #f0f0f0;
      font-weight: bold;
    }

    .delete-btn {
      background: #ff3b30;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍼 Boires bébé</h1>

    <div class="card">
      <div class="buttons" id="qtyButtons"></div>

      <div class="datetime-row">
        <input type="datetime-local" id="datetime">
        <button class="now-btn" onclick="setNow()">⏱️</button>
      </div>

      <button class="add-btn" onclick="addDrink()">Ajouter</button>
    </div>

    <div class="card">
      <table>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7zf8iUGfIIbDg8EeSFGshqtlbt0zwbb4",
  authDomain: "formulatracker-d8355.firebaseapp.com",
  projectId: "formulatracker-d8355",
  storageBucket: "formulatracker-d8355.firebasestorage.app",
  messagingSenderId: "35277205492",
  appId: "1:35277205492:web:0daa8a44c15dad8d5c53a1",
  measurementId: "G-BN5ZJF614C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const drinksRef = collection(db, "drinks");

let selectedQuantity = 120;

function mlToOz(ml) {
  return Math.round(ml / 29.5735);
}

function formatQty(q) {
  return `${q} ml / ${mlToOz(q)} oz`;
}

function getDateKey(date) {
  return date.toISOString().split("T")[0]; // YYYY-MM-DD
}

function renderButtons() {
  const container = document.getElementById("qtyButtons");
  const values = [60, 120, 180];

  container.innerHTML = values.map(v => `
    <button onclick="selectQuantity(${v})" data-q="${v}">
      ${formatQty(v)}
    </button>
  `).join("");
}

window.selectQuantity = function(q) {
  selectedQuantity = q;
  document.querySelectorAll(".buttons button").forEach(btn => {
    btn.style.opacity = (parseInt(btn.dataset.q) === q) ? "1" : "0.5";
  });
};

window.setNow = function () {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString()
    .slice(0, 16);
  document.getElementById("datetime").value = local;
};

window.addDrink = async function () {
  let datetime = document.getElementById("datetime").value;
  if (!datetime) datetime = new Date().toISOString();

  await addDoc(drinksRef, {
    quantity: selectedQuantity,
    datetime: new Date(datetime)
  });
};

window.deleteDrink = async function (id) {
  if (confirm("Supprimer ce boire ?")) {
    await deleteDoc(doc(db, "drinks", id));
  }
};

const q = query(drinksRef, orderBy("datetime", "desc"));

onSnapshot(q, (snapshot) => {
  const table = document.getElementById("table");
  table.innerHTML = "";

  if (snapshot.empty) {
    table.innerHTML = `<tr><td class="empty">Aucun boire</td></tr>`;
    return;
  }

  const groups = {};

  snapshot.forEach((docSnap) => {
    const data = docSnap.data();
    const date = new Date(data.datetime.seconds * 1000);

    const key = getDateKey(date);

    if (!groups[key]) {
      groups[key] = {
        total: 0,
        items: []
      };
    }

    groups[key].total += data.quantity;
    groups[key].items.push({
      id: docSnap.id,
      date,
      quantity: data.quantity
    });
  });

  const sortedDays = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  sortedDays.forEach(day => {
    const g = groups[day];

    table.innerHTML += `
      <tr class="day-header">
        <td colspan="2">
          📅 ${day} — Total: ${g.total} ml / ${mlToOz(g.total)} oz
        </td>
      </tr>
    `;

    g.items.forEach(item => {
      table.innerHTML += `
        <tr>
          <td>
            ${item.date.toLocaleTimeString()}<br>
            <strong>${item.quantity} ml / ${mlToOz(item.quantity)} oz</strong>
          </td>
          <td style="text-align:right;">
            <button class="delete-btn" onclick="deleteDrink('${item.id}')">X</button>
          </td>
        </tr>
      `;
    });
  });
});

renderButtons();
selectQuantity(120);
</script>
</body>
</html>
