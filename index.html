<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi bébé</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      margin: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 520px;
      width: 100%;
      padding: 16px;
    }

    h1 { text-align: center; }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .tab {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      background: #ddd;
      cursor: pointer;
    }

    .tab.active {
      background: #007aff;
      color: white;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .buttons button {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
      font-weight: bold;
      font-size: 13px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .datetime-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .now-btn {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #eee;
      font-size: 20px;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #34c759;
      color: white;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
      vertical-align: top;
    }

    .day-header {
      background: #f0f0f0;
      font-weight: bold;
    }

    .delete-btn {
      background: #ff3b30;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .hidden { display: none; }
  </style>
</head>

<body>
<div class="container">
  <h1>🍼 Tracker bébé</h1>

  <div class="tabs">
    <button class="tab active" id="tabMilk" onclick="switchTab('milk')">🍼</button>
    <button class="tab" id="tabFood" onclick="switchTab('food')">🍎</button>
  </div>

  <!-- 🍼 MILK -->
  <div class="card" id="milkForm">
    <div class="buttons" id="qtyButtons"></div>

    <div class="datetime-row">
      <input type="datetime-local" id="datetimeMilk">
      <button class="now-btn" onclick="setNow('datetimeMilk')">⏱️</button>
    </div>

    <button class="add-btn" onclick="addMilk()">Ajouter biberon</button>
  </div>

  <!-- 🍎 FOOD -->
  <div class="card hidden" id="foodForm">
    <input type="text" id="foodDesc" placeholder="Description du repas">

    <div class="buttons">
      <button onclick="selectFood('snack',1)">2-3 bouchées</button>
      <button onclick="selectFood('light',2)">Collation</button>
      <button onclick="selectFood('small',3)">Petit repas</button>
      <button onclick="selectFood('meal',4)">Repas</button>
      <button onclick="selectFood('big',5)">Gros repas</button>
    </div>

    <div class="datetime-row">
      <input type="datetime-local" id="datetimeFood">
      <button class="now-btn" onclick="setNow('datetimeFood')">⏱️</button>
    </div>

    <button class="add-btn" onclick="addFood()">Ajouter repas</button>
  </div>

  <div class="card">
    <table>
      <tbody id="table"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD7zf8iUGfIIbDg8EeSFGshqtlbt0zwbb4",
  authDomain: "formulatracker-d8355.firebaseapp.com",
  projectId: "formulatracker-d8355",
  storageBucket: "formulatracker-d8355.firebasestorage.app",
  messagingSenderId: "35277205492",
  appId: "1:35277205492:web:0daa8a44c15dad8d5c53a1",
  measurementId: "G-BN5ZJF614C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const milkRef = collection(db, "milk");
const foodRef = collection(db, "food");

let selectedMilk = 120;
let selectedFoodScore = 3;
let currentTab = "milk";

function mlToOz(ml) {
  return Math.round(ml / 29.5735);
}

function getKey(date) {
  return date.toISOString().split("T")[0];
}

window.switchTab = function(tab) {
  currentTab = tab;

  document.getElementById("milkForm").classList.toggle("hidden", tab !== "milk");
  document.getElementById("foodForm").classList.toggle("hidden", tab !== "food");

  document.getElementById("tabMilk").classList.toggle("active", tab === "milk");
  document.getElementById("tabFood").classList.toggle("active", tab === "food");
};

window.selectFood = function(_, score) {
  selectedFoodScore = score;
};

window.setNow = function(id) {
  const now = new Date();
  const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
    .toISOString().slice(0,16);
  document.getElementById(id).value = local;
};

window.addMilk = async function() {
  let dt = document.getElementById("datetimeMilk").value;
  if (!dt) dt = new Date().toISOString();

  await addDoc(milkRef, {
    type: "milk",
    quantity: selectedMilk,
    datetime: new Date(dt)
  });
};

window.addFood = async function() {
  let dt = document.getElementById("datetimeFood").value;
  if (!dt) dt = new Date().toISOString();

  const desc = document.getElementById("foodDesc").value;

  await addDoc(foodRef, {
    type: "food",
    description: desc,
    score: selectedFoodScore,
    datetime: new Date(dt)
  });
};

window.deleteItem = async function(collectionName, id) {
  if (confirm("Supprimer ?")) {
    await deleteDoc(doc(db, collectionName, id));
  }
};

renderMilkButtons();

function renderMilkButtons() {
  const container = document.getElementById("qtyButtons");
  const values = [60,120,180];

  container.innerHTML = values.map(v => `
    <button onclick="selectedMilk=${v}" style="opacity:${v===selectedMilk?1:0.5}">
      ${v} ml
    </button>
  `).join("");
}

const qMilk = query(milkRef, orderBy("datetime","desc"));
const qFood = query(foodRef, orderBy("datetime","desc"));

let milkData = [];
let foodData = [];

onSnapshot(qMilk, snap => {
  milkData = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  render();
});

onSnapshot(qFood, snap => {
  foodData = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  render();
});

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  const all = [
    ...milkData.map(d => ({...d, kind:"milk"})),
    ...foodData.map(d => ({...d, kind:"food"}))
  ].sort((a,b)=>b.datetime.seconds - a.datetime.seconds);

  const groups = {};

  all.forEach(item => {
    const date = new Date(item.datetime.seconds * 1000);
    const key = getKey(date);

    if (!groups[key]) {
      groups[key] = { milk:0, food:0, items:[] };
    }

    if (item.kind === "milk") groups[key].milk += item.quantity;
    else groups[key].food += item.score;

    groups[key].items.push({...item, date});
  });

  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(day => {
    const g = groups[day];

    table.innerHTML += `
      <tr class="day-header">
        <td colspan="2">
          📅 ${day} — 🍼 ${g.milk} ml (${mlToOz(g.milk)} oz) — 🍎 ${g.food}
        </td>
      </tr>
    `;

    g.items.forEach(i => {
      if (i.kind === "milk") {
        table.innerHTML += `
          <tr>
            <td>
              ${i.date.toLocaleTimeString()}<br>
              🍼 ${i.quantity} ml (${mlToOz(i.quantity)} oz)
            </td>
            <td><button class="delete-btn" onclick="deleteItem('milk','${i.id}')">X</button></td>
          </tr>`;
      } else {
        table.innerHTML += `
          <tr>
            <td>
              ${i.date.toLocaleTimeString()}<br>
              🍎 ${i.description || ""} (${i.score})
            </td>
            <td><button class="delete-btn" onclick="deleteItem('food','${i.id}')">X</button></td>
          </tr>`;
      }
    });
  });
}
</script>
</body>
</html>
