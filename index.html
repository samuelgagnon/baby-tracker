<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suivi des boires</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
    }

    .container {
      max-width: 500px;
      width: 100%;
      padding: 16px;
    }

    h1 {
      text-align: center;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .buttons button {
      flex: 1;
      padding: 16px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #007aff;
      color: white;
      font-weight: bold;
    }

    input[type="datetime-local"] {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      background: #34c759;
      color: white;
      font-weight: bold;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .delete-btn {
      background: #ff3b30;
      border: none;
      color: white;
      padding: 6px 10px;
      border-radius: 8px;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🍼 Boires bébé</h1>

    <div class="card">
      <div class="buttons">
        <button onclick="selectQuantity(60)">60</button>
        <button onclick="selectQuantity(120)">120</button>
        <button onclick="selectQuantity(180)">180</button>
      </div>

      <input type="datetime-local" id="datetime">

      <button class="add-btn" onclick="addDrink()">Ajouter</button>
    </div>

    <div class="card">
      <table>
        <tbody id="table"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      deleteDoc,
      doc,
      query,
      orderBy,
      onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
	  apiKey: "AIzaSyD7zf8uIGfIIbDg8EeSFGshqtlbt0zwbb4",
	  authDomain: "formulatracker-d8355.firebaseapp.com",
	  projectId: "formulatracker-d8355",
	  storageBucket: "formulatracker-d8355.firebasestorage.app",
	  messagingSenderId: "35277205492",
	  appId: "1:35277205492:web:0daa8a44c15dad8d5c53a1",
	  measurementId: "G-BN5ZJF614C"
	};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const drinksRef = collection(db, "drinks");

    let selectedQuantity = 120;

    window.selectQuantity = function(q) {
      selectedQuantity = q;
      document.querySelectorAll(".buttons button").forEach(btn => {
        btn.style.opacity = (btn.textContent == q) ? "1" : "0.5";
      });
    };

    window.addDrink = async function () {
      let datetime = document.getElementById("datetime").value;

      if (!datetime) {
        datetime = new Date().toISOString();
      }

      await addDoc(drinksRef, {
        quantity: selectedQuantity,
        datetime: new Date(datetime)
      });
    };

    window.deleteDrink = async function (id) {
      if (confirm("Supprimer ce boire ?")) {
        await deleteDoc(doc(db, "drinks", id));
      }
    };

    const q = query(drinksRef, orderBy("datetime", "desc"));

    onSnapshot(q, (snapshot) => {
      const table = document.getElementById("table");
      table.innerHTML = "";

      if (snapshot.empty) {
        table.innerHTML = `<tr><td class="empty">Aucun boire</td></tr>`;
        return;
      }

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();

        table.innerHTML += `
          <tr>
            <td>
              ${new Date(data.datetime.seconds * 1000).toLocaleString()}<br>
              <strong>${data.quantity} ml</strong>
            </td>
            <td style="text-align:right;">
              <button class="delete-btn" onclick="deleteDrink('${docSnap.id}')">X</button>
            </td>
          </tr>
        `;
      });
    });

    selectQuantity(120);
  </script>
</body>
</html>
